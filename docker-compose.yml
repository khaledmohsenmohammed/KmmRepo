services:
  postgres:
    image: postgres:15
    container_name: kmmrepo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: kmmrepo
      POSTGRES_PASSWORD: kmmrepo
      POSTGRES_DB: kmmrepo
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kmmrepo"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: kmmrepo-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  redis-data:
