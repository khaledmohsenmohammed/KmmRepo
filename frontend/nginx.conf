server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Single-page app: serve index.html for any unmatched client-side route.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache fingerprinted assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
